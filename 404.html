<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Seite nicht gefunden — immoMatch.ai</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0a0f1a;
      --paper: #f8f6f1;
      --accent: #1a6b4a;
      --accent-light: #e8f5ee;
      --accent-glow: #2dd882;
      --slate: #4a5568;
      --muted: #8a94a6;
      --border: #e2ddd4;
      --white: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }
    .error-code {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(6rem, 15vw, 12rem);
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--border);
      margin-bottom: 1rem;
    }
    .error-code span { color: var(--accent); }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    p {
      color: var(--slate);
      font-size: 1rem;
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: 0.85rem 2rem;
      border-radius: 100px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn-primary { background: var(--accent); color: var(--white); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(26, 107, 74, 0.3); }
    .btn-secondary { background: var(--white); color: var(--ink); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--ink); }
    .lang-links {
      margin-top: 3rem;
      display: flex;
      gap: 1.5rem;
      font-size: 0.85rem;
    }
    .lang-links a { color: var(--muted); text-decoration: none; }
    .lang-links a:hover { color: var(--accent); }
    .logo {
      position: absolute;
      top: 2rem;
      left: 2rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 1.35rem;
      letter-spacing: -0.03em;
      color: var(--ink);
      text-decoration: none;
    }
    .logo span { color: var(--accent); }
  </style>
</head>
<body>
  <a href="/" class="logo">immo<span>Match</span>.ai</a>
  <div class="error-code">4<span>0</span>4</div>
  <h1>Diese Seite gibt es nicht</h1>
  <p>Die angeforderte Seite wurde nicht gefunden. Möglicherweise wurde sie verschoben oder der Link ist fehlerhaft.</p>
  <div class="links">
    <a href="/" class="btn btn-primary">
      Zur Startseite
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </a>
    <a href="/#kontakt" class="btn btn-secondary">Kontakt</a>
  </div>
  <div class="lang-links">
    <a href="/">🇨🇭 Deutsch</a>
    <a href="/en/">🇬🇧 English</a>
    <a href="/fr/">🇫🇷 Français</a>
    <a href="/it/">🇮🇹 Italiano</a>
  </div>
</body>
</html>
